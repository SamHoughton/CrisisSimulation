<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img">
  <title>Crucible</title>
  <desc>Crucible crisis simulation platform wordmark with vessel icon</desc>

  <!-- Icon mark: crucible vessel -->
  <path
    d="M 14 18 L 20 62 Q 20 66 24 66 L 40 66 Q 44 66 44 62 L 50 18 Z"
    fill="none"
    stroke="#1db86a"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Heat shimmer lines at base -->
  <line x1="26" y1="56" x2="26" y2="62" stroke="#1db86a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="32" y1="58" x2="32" y2="64" stroke="#1db86a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="56" x2="38" y2="62" stroke="#1db86a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Rim handles -->
  <line x1="10" y1="20" x2="54" y2="20" stroke="#1db86a" stroke-width="2" stroke-linecap="round"/>
  <line x1="7"  y1="16" x2="13" y2="22" stroke="#1db86a" stroke-width="2" stroke-linecap="round"/>
  <line x1="57" y1="16" x2="51" y2="22" stroke="#1db86a" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark — ink on light -->
  <text
    x="66" y="54"
    font-family="'Bebas Neue', Impact, 'Arial Black', sans-serif"
    font-size="48"
    letter-spacing="4"
    fill="#1a1816"
  >CRUCIBLE</text>
</svg>
